aid: boise-cascade
name: Boise Cascade
description: >-
  Boise Cascade is a leading North American manufacturer and distributor of building
  materials for the residential and commercial construction industry. The company
  produces engineered wood products (EWP) including I-joists, LVL beams, and glulam,
  as well as structural panels and lumber, and distributes a broad range of building
  materials through its wholesale distribution network.
